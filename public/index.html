<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Arte & Ferro - Orçamentos</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header>
    <h1>Arte & Ferro - Sistema de Orçamentos</h1>
  </header>

  <main>
    <section class="card">
      <h2>Novo orçamento a partir de PDF</h2>
      <form id="upload-form">
  <label>PDF do cliente:
    <input type="file" id="pdf" name="pdf" accept="application/pdf" required />
  </label>

  <label>Imagens do projeto (opcional):
    <input type="file" id="imagens" name="imagens" accept="image/*" multiple />
  </label>

  <button type="submit">Enviar e calcular</button>
</form>
      <div id="upload-resultado"></div>
    </section>

    <section class="card">
      <h2>Orçamentos recentes</h2>
      <button id="btn-atualizar">Atualizar lista</button>
      <div id="lista-orcamentos"></div>
    </section>
  </main>

  <script src="assets/app.js"></script>
</body>
</html>
